<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Command Center — CLOUDIT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22252f;
      --surface3: #2a2d3a;
      --border: #2e3140;
      --text: #e4e6ef;
      --text-secondary: #8b8fa3;
      --text-muted: #5c6070;
      --critical: #ff4757;
      --high: #ff8c42;
      --medium: #ffc312;
      --sam: #7c5cfc;
      --group: #2ed573;
      --action: #3c87ff;
      --negative: #e056a0;
      --info: #3c87ff;
      --success: #2ed573;
      --accent: #7c5cfc;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(124, 92, 252, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(60, 135, 255, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; }

    .header {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      background: rgba(15, 17, 23, 0.8);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--action));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: white;
      box-shadow: 0 4px 12px rgba(124, 92, 252, 0.3);
    }

    .header-title h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-title span { font-size: 12px; color: var(--text-secondary); }
    .header-right { display: flex; align-items: center; gap: 16px; }

    .scan-status {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: var(--surface);
      border-radius: 20px; font-size: 13px; color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .scan-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(46, 213, 115, 0); }
    }

    .read-only-badge {
      padding: 6px 12px;
      background: rgba(46, 213, 115, 0.1);
      border: 1px solid rgba(46, 213, 115, 0.3);
      border-radius: 20px; font-size: 11px; font-weight: 600;
      color: var(--success); text-transform: uppercase; letter-spacing: 0.5px;
    }

    .main { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

    /* Summary Cards — 7 tags in a scrollable row */
    .summary-grid {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .summary-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 20px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      min-width: 150px;
      flex: 1;
    }

    .summary-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .summary-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow); }
    .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }

    .summary-card[data-tag="critical"]::before { background: var(--critical); }
    .summary-card[data-tag="high"]::before { background: var(--high); }
    .summary-card[data-tag="medium"]::before { background: var(--medium); }
    .summary-card[data-tag="sam"]::before { background: var(--sam); }
    .summary-card[data-tag="group"]::before { background: var(--group); }
    .summary-card[data-tag="action_required"]::before { background: var(--action); }
    .summary-card[data-tag="negative"]::before { background: var(--negative); }

    .summary-card .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .summary-card[data-tag="critical"] .label { color: var(--critical); }
    .summary-card[data-tag="high"] .label { color: var(--high); }
    .summary-card[data-tag="medium"] .label { color: var(--medium); }
    .summary-card[data-tag="sam"] .label { color: var(--sam); }
    .summary-card[data-tag="group"] .label { color: var(--group); }
    .summary-card[data-tag="action_required"] .label { color: var(--action); }
    .summary-card[data-tag="negative"] .label { color: var(--negative); }

    .summary-card .count { font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .summary-card .subtitle { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Filter bar */
    .filter-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }

    .filter-btn {
      padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary); font-size: 12px;
      font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit;
    }

    .filter-btn:hover { background: var(--surface2); color: var(--text); }
    .filter-btn.active { color: white; }
    .filter-btn[data-tag="all"].active { background: var(--accent); border-color: var(--accent); }
    .filter-btn[data-tag="critical"].active { background: var(--critical); border-color: var(--critical); }
    .filter-btn[data-tag="high"].active { background: var(--high); border-color: var(--high); }
    .filter-btn[data-tag="medium"].active { background: var(--medium); border-color: var(--medium); color: #1a1d27; }
    .filter-btn[data-tag="sam"].active { background: var(--sam); border-color: var(--sam); }
    .filter-btn[data-tag="group"].active { background: var(--group); border-color: var(--group); color: #1a1d27; }
    .filter-btn[data-tag="action_required"].active { background: var(--action); border-color: var(--action); }
    .filter-btn[data-tag="negative"].active { background: var(--negative); border-color: var(--negative); }
    .filter-btn[data-tag="unread"].active { background: var(--accent); border-color: var(--accent); }

    /* Email cards */
    .email-list { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .email-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 18px 22px;
      margin-bottom: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
      border-left: 3px solid var(--border);
    }

    .email-card:hover { background: var(--surface2); border-color: var(--surface3); transform: translateX(4px); }
    .dismiss-btn {
      position: absolute; top: 10px; right: 10px; width: 24px; height: 24px;
      border-radius: 6px; border: none; background: transparent; color: var(--text-muted);
      font-size: 16px; cursor: pointer; display: none; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 2;
    }
    .email-card:hover .dismiss-btn { display: flex; }
    .dismiss-btn:hover { background: rgba(255,71,87,0.15); color: var(--critical); }

    .resolve-btn {
      position: absolute; top: 10px; right: 10px;
      padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(46,213,115,0.3);
      background: rgba(46,213,115,0.1); color: var(--success);
      font-size: 10px; font-weight: 600; cursor: pointer; display: none;
      transition: all 0.2s; z-index: 2; font-family: inherit; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .email-card:hover .resolve-btn { display: block; }
    .resolve-btn:hover { background: var(--success); color: #1a1d27; }
    .email-card.expanded { background: var(--surface2); }
    .email-card.priority-critical { border-left-color: var(--critical); }
    .email-card.priority-high { border-left-color: var(--high); }
    .email-card.priority-medium { border-left-color: var(--medium); }
    .email-card.priority-sam { border-left-color: var(--sam); }
    .email-card.priority-group { border-left-color: var(--group); }

    .email-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .email-main { flex: 1; min-width: 0; }

    .email-sender { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

    .avatar {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
    }

    .sender-name { font-size: 14px; font-weight: 600; }
    .sender-email { font-size: 12px; color: var(--text-muted); }
    .email-subject { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
    .email-preview { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    .email-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .email-time { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    .email-tags { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 200px; }

    .tag {
      padding: 2px 8px; border-radius: 6px; font-size: 10px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .tag-critical { background: rgba(255,71,87,0.15); color: var(--critical); }
    .tag-high { background: rgba(255,140,66,0.15); color: var(--high); }
    .tag-medium { background: rgba(255,195,18,0.15); color: var(--medium); }
    .tag-sam { background: rgba(124,92,252,0.15); color: var(--sam); }
    .tag-group { background: rgba(46,213,115,0.15); color: var(--group); }
    .tag-action_required { background: rgba(60,135,255,0.15); color: var(--action); }
    .tag-negative { background: rgba(224,86,160,0.15); color: var(--negative); }
    .tag-unread { background: var(--accent); color: white; }
    .tag-file { background: var(--surface3); color: var(--text-secondary); }

    /* Expanded detail */
    .email-detail { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: none; }
    .email-card.expanded .email-detail { display: block; animation: fadeIn 0.2s ease; }

    .detail-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .detail-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); width: 100px; flex-shrink: 0; padding-top: 2px; }
    .detail-value { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    .action-box {
      background: rgba(60,135,255,0.08);
      border: 1px solid rgba(60,135,255,0.25);
      border-radius: var(--radius-sm);
      padding: 12px 16px; font-size: 13px; color: var(--action); line-height: 1.5;
    }

    .email-card.priority-critical .action-box { background: rgba(255,71,87,0.08); border-color: rgba(255,71,87,0.25); color: var(--critical); }
    .email-card.priority-high .action-box { background: rgba(255,140,66,0.08); border-color: rgba(255,140,66,0.25); color: var(--high); }

    .outlook-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; background: linear-gradient(135deg, #0078d4, #106ebe);
      color: white; border: none; border-radius: 8px; font-size: 12px;
      font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; margin-top: 4px;
    }

    .outlook-btn:hover { background: linear-gradient(135deg, #106ebe, #005a9e); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,120,212,0.3); }
    .outlook-btn svg { width: 14px; height: 14px; }

    /* Informational */
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-top: 12px; }
    .info-category { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px 20px; }
    .info-category-title { font-size: 13px; font-weight: 600; color: var(--action); margin-bottom: 10px; }
    .info-item { font-size: 12px; color: var(--text-secondary); padding: 4px 0; line-height: 1.4; display: flex; align-items: flex-start; gap: 8px; }
    .info-item::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); margin-top: 6px; flex-shrink: 0; }

    /* Key Senders */
    .senders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 12px; margin-top: 12px; }
    .sender-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 14px; transition: all 0.2s; }
    .sender-card:hover { background: var(--surface2); }
    .sender-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
    .sender-info { flex: 1; min-width: 0; }
    .sender-info .name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .sender-info .context { font-size: 12px; color: var(--text-secondary); }
    .sender-count { font-size: 20px; font-weight: 800; color: var(--accent); }

    .section-header { display: flex; align-items: center; gap: 10px; margin: 24px 0 12px; padding: 0 4px; }
    .section-dot { width: 10px; height: 10px; border-radius: 50%; }
    .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .section-count { font-size: 12px; color: var(--text-muted); background: var(--surface2); padding: 2px 8px; border-radius: 10px; }

    .footer { text-align: center; padding: 32px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 48px; }
    .footer .warning { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(46,213,115,0.08); border: 1px solid rgba(46,213,115,0.2); border-radius: 20px; color: var(--success); font-weight: 500; margin-bottom: 8px; }

    .no-results { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; }

    /* Draft Reply Button */
    .draft-reply-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; background: linear-gradient(135deg, #2ed573, #05c46b);
      color: #1a1d27; border: none; border-radius: 8px; font-size: 12px;
      font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.2s; margin-top: 4px; margin-right: 8px;
    }
    .draft-reply-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46,213,115,0.3); }
    .draft-reply-btn svg { width: 14px; height: 14px; }

    /* Draft Modal Overlay */
    .draft-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      z-index: 1000; justify-content: center; align-items: center; padding: 20px;
    }
    .draft-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

    .draft-modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }

    .draft-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .draft-header h2 { font-size: 16px; font-weight: 700; }
    .draft-close {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary); font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .draft-close:hover { background: var(--surface2); color: var(--text); }

    .draft-body { padding: 24px; }

    .draft-context {
      background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 18px;
      margin-bottom: 20px; border-left: 3px solid var(--accent);
    }
    .draft-context-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px; }
    .draft-context-from { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .draft-context-subject { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .draft-context-preview { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

    .draft-section { margin-bottom: 18px; }
    .draft-section-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }

    .tone-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .tone-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary); font-size: 12px;
      font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .tone-btn:hover { background: var(--surface2); color: var(--text); }
    .tone-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }

    .draft-textarea {
      width: 100%; min-height: 80px; padding: 12px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      font-family: inherit; font-size: 13px; line-height: 1.6; resize: vertical;
      transition: border-color 0.2s;
    }
    .draft-textarea:focus { outline: none; border-color: var(--accent); }
    .draft-textarea::placeholder { color: var(--text-muted); }

    .draft-output {
      min-height: 120px; white-space: pre-wrap;
    }

    .draft-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .draft-action-btn {
      padding: 10px 20px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
    }
    .draft-action-btn:hover { transform: translateY(-1px); }

    .btn-generate {
      background: linear-gradient(135deg, var(--accent), #6340e0); color: white;
      box-shadow: 0 4px 12px rgba(124,92,252,0.3);
    }
    .btn-generate:hover { box-shadow: 0 6px 16px rgba(124,92,252,0.4); }

    .btn-copy {
      background: linear-gradient(135deg, #2ed573, #05c46b); color: #1a1d27;
      box-shadow: 0 4px 12px rgba(46,213,115,0.3);
    }
    .btn-copy:hover { box-shadow: 0 6px 16px rgba(46,213,115,0.4); }

    .btn-outlook-draft {
      background: linear-gradient(135deg, #0078d4, #106ebe); color: white;
    }

    .copy-feedback {
      font-size: 12px; color: var(--success); font-weight: 600; padding: 10px 0;
      display: none; align-items: center; gap: 6px;
    }
    .copy-feedback.show { display: flex; animation: fadeIn 0.2s ease; }

    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .btn-generate:disabled { opacity: 0.7; cursor: wait; }

    @media (max-width: 900px) { .main { padding: 16px; } .header { padding: 16px; } .info-grid, .senders-grid { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .header-right { display: none; } .summary-grid { gap: 8px; } .summary-card { min-width: 120px; padding: 12px 14px; } }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">C</div>
        <div class="header-title">
          <h1>Email Command Center</h1>
          <span id="headerDate">Loading...</span>
        </div>
      </div>
      <div class="header-right">
        <div class="read-only-badge">Read-Only</div>
        <div class="scan-status">
          <div class="scan-dot"></div>
          <span>Scanner Active — Hourly</span>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="summary-grid" id="summaryGrid"></div>
      <div class="filter-bar" id="filterBar"></div>
      <div id="emailList"></div>
      <div id="infoSection"></div>
      <div id="sendersSection"></div>
    </main>
    <footer class="footer">
      <div class="warning">No emails replied to or modified</div>
      <p id="lastUpdated">Last updated: —</p>
    </footer>

    <!-- Draft Reply Modal -->
    <div class="draft-overlay" id="draftOverlay" onclick="if(event.target===this)closeDraft()">
      <div class="draft-modal">
        <div class="draft-header">
          <h2>Draft Reply</h2>
          <button class="draft-close" onclick="closeDraft()">&times;</button>
        </div>
        <div class="draft-body">
          <div class="draft-context" id="draftContext"></div>

          <div class="draft-section">
            <div class="draft-section-label">Tone</div>
            <div class="tone-options" id="toneOptions">
              <button class="tone-btn selected" data-tone="Professional" onclick="selectTone(this)">Professional</button>
              <button class="tone-btn" data-tone="Apologetic" onclick="selectTone(this)">Apologetic</button>
              <button class="tone-btn" data-tone="Firm" onclick="selectTone(this)">Firm</button>
              <button class="tone-btn" data-tone="Friendly" onclick="selectTone(this)">Friendly</button>
              <button class="tone-btn" data-tone="Escalation" onclick="selectTone(this)">Escalation</button>
            </div>
          </div>

          <div class="draft-section">
            <div class="draft-section-label">What should the reply convey?</div>
            <textarea class="draft-textarea" id="draftInstructions" placeholder="Optional — e.g., 'Apologize for delay, confirm Tuesday delivery'. Leave blank for AI to draft the best response automatically."></textarea>
          </div>

          <div class="draft-section">
            <div class="draft-actions">
              <button class="draft-action-btn btn-generate" onclick="generateDraftPrompt()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                Generate Draft
              </button>
              <div class="copy-feedback" id="promptFeedback">Draft generated successfully!</div>
            </div>
          </div>

          <div class="draft-section">
            <div class="draft-section-label">Generated Draft (edit if needed)</div>
            <textarea class="draft-textarea draft-output" id="draftOutput" placeholder="Click 'Generate Draft' above — your reply will appear here..."></textarea>
          </div>

          <div class="draft-actions">
            <button class="draft-action-btn btn-copy" onclick="copyToOutlook()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Copy to Outlook
            </button>
            <div class="copy-feedback" id="draftFeedback">Copied! Opening Outlook...</div>
          </div>
          <input type="hidden" id="draftOutlookLink" value="" />
        </div>
      </div>
    </div>
  </div>

  <script>
    const TAG_META = {
      critical:        { label: 'Critical',         color: '#ff4757', subtitle: 'Immediate action' },
      high:            { label: 'High',             color: '#ff8c42', subtitle: 'Escalation level' },
      medium:          { label: 'Medium',           color: '#ffc312', subtitle: 'Needs review' },
      sam:             { label: 'Sam',              color: '#7c5cfc', subtitle: 'CEO emails' },
      group:           { label: 'Group Inbox',      color: '#2ed573', subtitle: 'Shared mailbox' },
      action_required: { label: 'Action Required',  color: '#3c87ff', subtitle: 'Pending action' },
      negative:        { label: 'Neg. Sentiment',   color: '#e056a0', subtitle: 'Complaints/issues' },
    };

    const AVATAR_COLORS = ['#7c5cfc','#3c87ff','#ff4757','#ff8c42','#ffc312','#2ed573','#e056a0','#00d2d3','#ff6348','#5f27cd'];

    function hashColor(s) { let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h); return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }
    function getInitials(n) { return n.split(/[\s@.]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
    function timeAgo(d) { const ms=Date.now()-new Date(d);const m=Math.floor(ms/60000);const h=Math.floor(ms/3600000);const dy=Math.floor(ms/86400000); if(m<60)return m+'m ago';if(h<24)return h+'h ago';if(dy===1)return 'Yesterday';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
    function fmtDate(d) { return new Date(d).toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true}); }

    // Priority order for border color
    const PRIORITY = ['critical','high','medium','sam','group','action_required','negative'];

    function topPriority(tags) {
      for (const p of PRIORITY) { if (tags.includes(p)) return p; }
      return 'medium';
    }

    let currentFilter = 'all';
    let data = null;

    // Embedded fallback data (updated by scanner)
    const EMBEDDED_DATA = null;

    async function loadData() {
      try {
        const r = await fetch('data.json?t='+Date.now());
        data = await r.json();
        autoCleanup();
        render();
      } catch(e) {
        if (EMBEDDED_DATA) { data = EMBEDDED_DATA; render(); }
        else console.error('Failed to load data:', e);
      }
    }

    // Auto-remove emails older than 72 hours
    function autoCleanup() {
      if (!data || !data.emails) return;
      const now = Date.now();
      const hours72 = 72 * 60 * 60 * 1000;
      const before = data.emails.length;
      data.emails = data.emails.filter(e => (now - new Date(e.time).getTime()) < hours72);
      if (data.emails.length < before) {
        // Recount and save
        const tags = ['critical','high','medium','sam','group','action_required','negative'];
        tags.forEach(t => { data.summary[t] = data.emails.filter(e => e.tags && e.tags.includes(t)).length; });
        fetch('/api/save-data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).catch(() => {});
      }
    }

    function getFilteredEmails() {
      if (!data || !data.emails) return [];
      if (currentFilter === 'all') return data.emails;
      if (currentFilter === 'unread') return data.emails.filter(e => !e.isRead);
      return data.emails.filter(e => e.tags && e.tags.includes(currentFilter));
    }

    function render() {
      if (!data) return;

      document.getElementById('headerDate').textContent =
        `Scan range: ${data.scanRange} | ${data.scanMode === 'initial' ? 'Initial 7-day scan' : 'Live monitoring'}`;

      // Summary cards
      let summaryHtml = '';
      for (const [tag, meta] of Object.entries(TAG_META)) {
        const count = data.summary?.[tag] || 0;
        const isActive = currentFilter === tag;
        summaryHtml += `
          <div class="summary-card ${isActive ? 'active' : ''}" data-tag="${tag}" onclick="setFilter('${tag}')">
            <div class="label">${meta.label}</div>
            <div class="count">${count}</div>
            <div class="subtitle">${meta.subtitle}</div>
          </div>`;
      }
      document.getElementById('summaryGrid').innerHTML = summaryHtml;

      // Filter bar
      const filters = [
        { key: 'all', label: 'All Emails' },
        ...Object.entries(TAG_META).map(([k,v]) => ({ key: k, label: v.label })),
        { key: 'unread', label: 'Unread Only' },
      ];
      document.getElementById('filterBar').innerHTML = filters.map(f =>
        `<button class="filter-btn ${currentFilter===f.key?'active':''}" data-tag="${f.key}" onclick="setFilter('${f.key}')">${f.label}</button>`
      ).join('');

      // Email list
      const emails = getFilteredEmails();
      let emailHtml = '';
      if (emails.length > 0) {
        emailHtml = `<div class="email-list">`;
        emails.forEach((email, i) => { emailHtml += renderEmailCard(email, i); });
        emailHtml += `</div>`;
      } else if (currentFilter !== 'all') {
        emailHtml = `<div class="no-results">No emails match this filter</div>`;
      }
      document.getElementById('emailList').innerHTML = emailHtml;

      // Info section
      if (currentFilter === 'all' && data.informational) {
        document.getElementById('infoSection').innerHTML = `
          <div class="section-header">
            <div class="section-dot" style="background:var(--info);box-shadow:0 0 8px var(--info)"></div>
            <div class="section-title">Informational</div>
            <div class="section-count">${data.summary?.informational || '50+'}+</div>
          </div>
          <div class="info-grid">
            ${data.informational.map(cat => `
              <div class="info-category">
                <div class="info-category-title">${cat.category}</div>
                ${cat.items.map(item => `<div class="info-item">${item}</div>`).join('')}
              </div>`).join('')}
          </div>`;
        document.getElementById('infoSection').style.display = '';
      } else {
        document.getElementById('infoSection').style.display = 'none';
      }

      // Senders section
      if (currentFilter === 'all' && data.keySenders) {
        document.getElementById('sendersSection').innerHTML = `
          <div class="section-header">
            <div class="section-dot" style="background:var(--accent);box-shadow:0 0 8px var(--accent)"></div>
            <div class="section-title">Key Senders</div>
          </div>
          <div class="senders-grid">
            ${data.keySenders.map(s => {
              const ini = getInitials(s.sender);
              const col = hashColor(s.sender);
              return `<div class="sender-card">
                <div class="sender-avatar" style="background:${col}">${ini}</div>
                <div class="sender-info"><div class="name">${s.sender}</div><div class="context">${s.context}</div></div>
                <div class="sender-count">${s.count}</div>
              </div>`;
            }).join('')}
          </div>`;
        document.getElementById('sendersSection').style.display = '';
      } else {
        document.getElementById('sendersSection').style.display = 'none';
      }

      document.getElementById('lastUpdated').textContent = `Last updated: ${fmtDate(data.lastUpdated)}`;
    }

    function renderEmailCard(email, idx) {
      const ini = getInitials(email.fromName || email.from);
      const col = hashColor(email.from);
      const tags = email.tags || [];
      const prio = topPriority(tags);

      const tagHtml = tags.map(t => {
        const m = TAG_META[t];
        return m ? `<span class="tag tag-${t}">${m.label}</span>` : '';
      }).join('') +
        (!email.isRead ? '<span class="tag tag-unread">New</span>' : '') +
        (email.hasAttachments ? '<span class="tag tag-file">File</span>' : '');

      return `
        <div class="email-card priority-${prio}" id="ecard-${idx}" onclick="toggleCard(${idx})">
          ${(tags.includes('critical') || tags.includes('high'))
            ? '<button class="resolve-btn" onclick="event.stopPropagation();resolveEmail('+idx+')" title="Mark Resolved">Resolved</button>'
            : '<button class="dismiss-btn" onclick="event.stopPropagation();dismissEmail('+idx+')" title="Dismiss">&times;</button>'
          }
          <div class="email-top">
            <div class="email-main">
              <div class="email-sender">
                <div class="avatar" style="background:${col}">${ini}</div>
                <div>
                  <div class="sender-name">${email.fromName||email.from}</div>
                  <div class="sender-email">${email.from}</div>
                </div>
              </div>
              <div class="email-subject">${email.subject}</div>
              <div class="email-preview">${email.keyPoints}</div>
            </div>
            <div class="email-meta">
              <div class="email-time">${timeAgo(email.time)}</div>
              <div class="email-tags">${tagHtml}</div>
            </div>
          </div>
          <div class="email-detail">
            <div class="detail-row"><div class="detail-label">Received</div><div class="detail-value">${fmtDate(email.time)}</div></div>
            ${email.group ? `<div class="detail-row"><div class="detail-label">Group</div><div class="detail-value">${email.group}</div></div>` : ''}
            <div class="detail-row"><div class="detail-label">Key Points</div><div class="detail-value">${email.keyPoints}</div></div>
            <div class="detail-row"><div class="detail-label">Action</div><div class="detail-value"><div class="action-box">${email.actionRequired}</div></div></div>
            <div class="detail-row"><div class="detail-label">Actions</div><div class="detail-value" style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="draft-reply-btn" onclick="event.stopPropagation();openDraft(${idx})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>Draft Reply</button>
              ${email.webLink ? `<a href="${email.webLink}" target="_blank" class="outlook-btn" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Open in Outlook</a>` : ''}
            </div></div>
          </div>
        </div>`;
    }

    function setFilter(f) { currentFilter = currentFilter === f && f !== 'all' ? 'all' : f; render(); }
    function toggleCard(i) { document.getElementById('ecard-'+i).classList.toggle('expanded'); }

    function dismissEmail(idx) {
      const emails = getFilteredEmails();
      const email = emails[idx];
      if (!email) return;

      // Remove from data.emails by matching subject + from + time
      data.emails = data.emails.filter(e =>
        !(e.subject === email.subject && e.from === email.from && e.time === email.time)
      );

      // Recount tags
      const tags = ['critical','high','medium','sam','group','action_required','negative'];
      tags.forEach(t => {
        data.summary[t] = data.emails.filter(e => e.tags && e.tags.includes(t)).length;
      });

      // Save to server
      fetch('/api/save-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }).catch(() => {});

      render();
    }

    function resolveEmail(idx) {
      const emails = getFilteredEmails();
      const email = emails[idx];
      if (!email) return;

      // Remove from data.emails
      data.emails = data.emails.filter(e =>
        !(e.subject === email.subject && e.from === email.from && e.time === email.time)
      );

      // Recount tags
      const allTags = ['critical','high','medium','sam','group','action_required','negative'];
      allTags.forEach(t => {
        data.summary[t] = data.emails.filter(e => e.tags && e.tags.includes(t)).length;
      });

      // Save
      fetch('/api/save-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }).catch(() => {});

      render();
    }

    // --- Draft Reply Feature ---
    let draftEmail = null;
    let selectedTone = 'Professional';

    function openDraft(idx) {
      const emails = getFilteredEmails();
      const email = emails[idx];
      if (!email) return;
      draftEmail = email;
      selectedTone = 'Professional';

      // Reset tone buttons
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
      document.querySelector('.tone-btn[data-tone="Professional"]').classList.add('selected');

      // Fill context
      document.getElementById('draftContext').innerHTML = `
        <div class="draft-context-label">Replying to</div>
        <div class="draft-context-from">${email.fromName || email.from} &lt;${email.from}&gt;</div>
        <div class="draft-context-subject">${email.subject}</div>
        <div class="draft-context-preview">${email.keyPoints}</div>
      `;

      // Store Outlook link
      document.getElementById('draftOutlookLink').value = email.webLink || '';

      // Clear fields
      document.getElementById('draftInstructions').value = '';
      document.getElementById('draftOutput').value = '';
      document.getElementById('promptFeedback').classList.remove('show');
      document.getElementById('draftFeedback').classList.remove('show');

      document.getElementById('draftOverlay').classList.add('open');
    }

    function closeDraft() {
      document.getElementById('draftOverlay').classList.remove('open');
    }

    function selectTone(btn) {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTone = btn.dataset.tone;
    }

    async function generateDraftPrompt() {
      const email = draftEmail;
      if (!email) return;

      const instructions = document.getElementById('draftInstructions').value.trim();

      // Show loading state
      const btn = document.querySelector('.btn-generate');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Generating...';
      btn.disabled = true;
      document.getElementById('draftOutput').value = 'Generating draft reply...';

      try {
        const resp = await fetch('/api/generate-draft', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            from: email.from,
            fromName: email.fromName,
            subject: email.subject,
            keyPoints: email.keyPoints,
            actionRequired: email.actionRequired,
            tone: selectedTone,
            instructions: instructions,
          }),
        });

        const result = await resp.json();
        if (result.draft) {
          document.getElementById('draftOutput').value = result.draft;
          const fb = document.getElementById('promptFeedback');
          fb.textContent = 'Draft generated successfully!';
          fb.classList.add('show');
          setTimeout(() => fb.classList.remove('show'), 3000);
        } else {
          document.getElementById('draftOutput').value = 'Error: ' + (result.error || 'Failed to generate draft');
        }
      } catch (e) {
        document.getElementById('draftOutput').value = 'Error: Could not connect to API. Make sure the server is running at localhost:8090';
      }

      btn.innerHTML = originalText;
      btn.disabled = false;
    }

    function copyToOutlook() {
      const draft = document.getElementById('draftOutput').value.trim();
      if (!draft) {
        document.getElementById('draftOutput').focus();
        document.getElementById('draftOutput').style.borderColor = 'var(--critical)';
        setTimeout(() => document.getElementById('draftOutput').style.borderColor = '', 2000);
        return;
      }

      navigator.clipboard.writeText(draft).then(() => {
        const fb = document.getElementById('draftFeedback');
        fb.classList.add('show');
        setTimeout(() => fb.classList.remove('show'), 4000);

        // Open Outlook after copying
        const webLink = document.getElementById('draftOutlookLink').value;
        if (webLink) {
          setTimeout(() => window.open(webLink, '_blank'), 500);
        }
      });
    }

    // Close modal on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDraft(); });

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
